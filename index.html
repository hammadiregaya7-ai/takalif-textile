<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تكاليف سوفت - النسيج Pro v2</title>
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.14.0/dist/sql-wasm.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .teal { background-color: #0f766e; }
    .screen { display: none; }
    .active { display: block; }
    #print-area { display: none; }
    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 40px; font-size: 15px; }
    }
  </style>
</head>
<body class="bg-gray-100 rtl">

  <!-- Top Bar -->
  <div class="teal text-white p-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <i onclick="showScreen('dashboard')" class="fas fa-bars text-3xl cursor-pointer"></i>
      <h1 class="text-2xl font-bold">تكاليف سوفت - النسيج Pro v2</h1>
    </div>
  </div>

  <!-- Quick Buttons -->
  <div class="p-4 grid grid-cols-3 gap-3">
    <button onclick="showScreen('dashboard')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">📊</div><p class="font-bold text-sm">الرئيسية</p>
    </button>
    <button onclick="showScreen('pos')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">🛒</div><p class="font-bold text-sm">نقاط البيع</p>
    </button>
    <button onclick="showScreen('salesList')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">📋</div><p class="font-bold text-sm">الفواتير</p>
    </button>
    <button onclick="showScreen('products')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">📦</div><p class="font-bold text-sm">الأصناف</p>
    </button>
    <button onclick="showScreen('customers')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">👥</div><p class="font-bold text-sm">العملاء</p>
    </button>
    <button onclick="showScreen('suppliers')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">🏪</div><p class="font-bold text-sm">الموردين</p>
    </button>
    <button onclick="showScreen('cash')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">📄</div><p class="font-bold text-sm">قبض/صرف</p>
    </button>
    <button onclick="showScreen('reports')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">📈</div><p class="font-bold text-sm">التقارير</p>
    </button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="screen active p-4">
    <h2 class="text-2xl font-bold mb-4">الرئيسية</h2>
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white p-6 rounded-3xl shadow text-center">
        <p class="text-sm text-gray-500">مبيعات اليوم</p>
        <p id="today-sales" class="text-4xl font-bold text-teal-600">0 ريال</p>
      </div>
      <div class="bg-white p-6 rounded-3xl shadow text-center">
        <p class="text-sm text-gray-500">الربح اليوم</p>
        <p id="today-profit" class="text-4xl font-bold text-emerald-600">0 ريال</p>
      </div>
    </div>
    <div class="mt-6 bg-white p-6 rounded-3xl shadow">
      <h3 class="font-bold mb-3">أصناف قريبة من النفاد</h3>
      <div id="low-stock-list" class="space-y-3"></div>
    </div>
  </div>

  <!-- POS -->
  <div id="pos" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">نقاط البيع</h2>
    <div class="bg-white rounded-3xl shadow p-6">
      <select id="pos-customer" class="w-full p-4 border rounded-2xl mb-4"></select>
      <input id="pos-date" type="date" class="w-full p-4 border rounded-2xl mb-4">
      <input id="product-search-input" type="text" placeholder="ابحث عن صنف..." class="w-full p-4 border rounded-2xl mb-4" onkeyup="if(event.key==='Enter') searchAndAddToCart()">
      <div id="cart-items" class="space-y-3 mb-6 min-h-[200px]"></div>
      <div class="flex justify-between text-2xl font-bold border-t pt-4">
        <span>الإجمالي</span>
        <span id="cart-total" class="text-teal-600">0 ريال</span>
      </div>
      <div class="grid grid-cols-2 gap-4 mt-8">
        <button onclick="saveSale()" class="bg-green-600 text-white py-6 rounded-3xl text-xl font-bold">💾 حفظ الفاتورة</button>
        <button onclick="printCurrentSale()" class="bg-blue-600 text-white py-6 rounded-3xl text-xl font-bold">🖨️ طباعة A4</button>
      </div>
    </div>
  </div>

  <!-- SALES LIST -->
  <div id="salesList" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">الفواتير السابقة</h2>
    <div id="sales-list-container" class="space-y-4"></div>
  </div>

  <!-- PRODUCTS -->
  <div id="products" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">إدارة الأصناف</h2>
    <button onclick="addNewProduct()" class="w-full bg-teal-600 text-white py-4 rounded-3xl mb-6">+ إضافة صنف جديد</button>
    <div id="products-list" class="space-y-4"></div>
  </div>

  <!-- CUSTOMERS -->
  <div id="customers" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">إدارة العملاء</h2>
    <button onclick="addCustomer()" class="w-full bg-teal-600 text-white py-4 rounded-3xl mb-6">+ إضافة عميل جديد</button>
    <div id="customers-list" class="space-y-4"></div>
  </div>

  <!-- SUPPLIERS -->
  <div id="suppliers" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">إدارة الموردين</h2>
    <button onclick="addSupplier()" class="w-full bg-teal-600 text-white py-4 rounded-3xl mb-6">+ إضافة مورد جديد</button>
    <div id="suppliers-list" class="space-y-4"></div>
  </div>

  <!-- CASH -->
  <div id="cash" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">قبض / صرف</h2>
    <div class="bg-white rounded-3xl shadow overflow-hidden">
      <table class="w-full">
        <thead class="bg-teal-700 text-white"><tr><th class="p-3">النوع</th><th class="p-3">البيان</th><th class="p-3">المبلغ</th><th class="p-3">التاريخ</th><th class="p-3">رقم</th></tr></thead>
        <tbody id="cash-table" class="divide-y"></tbody>
      </table>
    </div>
    <button onclick="addCashTransaction()" class="fixed bottom-8 right-8 bg-teal-600 text-white w-16 h-16 rounded-full text-5xl shadow-2xl flex items-center justify-center z-50">+</button>
  </div>

  <!-- REPORTS -->
  <div id="reports" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">التقارير المتقدمة</h2>
    <div id="reports-content" class="bg-white rounded-3xl shadow p-6"></div>
  </div>

  <!-- Hidden Print Area -->
  <div id="print-area" class="hidden"></div>

  <script>
    let db;
    let currentCart = [];

    function saveDB() {
      const data = db.export();
      const base64 = btoa(String.fromCharCode(...new Uint8Array(data)));
      localStorage.setItem('takalifProV2_nesij_full', base64);
    }

    function loadDB(SQL) {
      const saved = localStorage.getItem('takalifProV2_nesij_full');
      if (saved) {
        const binary = Uint8Array.from(atob(saved).split('').map(c => c.charCodeAt(0)));
        db = new SQL.Database(binary);
        return;
      }
      db = new SQL.Database();
    }

    async function initSQLite() {
      const SQL = await initSqlJs({ locateFile: f => `https://cdn.jsdelivr.net/npm/sql.js@1.14.0/dist/${f}` });
      loadDB(SQL);

      db.run(`
        CREATE TABLE IF NOT EXISTS products (id INTEGER PRIMARY KEY, name TEXT, cost REAL DEFAULT 0, price REAL, stock REAL DEFAULT 0, minStock REAL DEFAULT 10, unit TEXT DEFAULT 'متر');
        CREATE TABLE IF NOT EXISTS customers (id INTEGER PRIMARY KEY, name TEXT, phone TEXT, balance REAL DEFAULT 0);
        CREATE TABLE IF NOT EXISTS suppliers (id INTEGER PRIMARY KEY, name TEXT, phone TEXT, balance REAL DEFAULT 0);
        CREATE TABLE IF NOT EXISTS cash (id INTEGER PRIMARY KEY, type TEXT, description TEXT, amount REAL, date TEXT, voucher INTEGER);
        CREATE TABLE IF NOT EXISTS invoices (id INTEGER PRIMARY KEY, date TEXT, customer TEXT, total REAL, profit REAL);
        CREATE TABLE IF NOT EXISTS invoice_items (invoice_id INTEGER, product_id INTEGER, name TEXT, qty REAL, price REAL, cost REAL);
      `);

      refreshAll();
      console.log('%c✅ تكاليف سوفت Pro v2 - الكود الكامل بدون أي تخطي', 'color:#0f766e;font-size:18px;font-weight:bold');
    }

    function refreshAll() {
      renderDashboard();
      renderProducts();
      renderCustomers();
      renderSuppliers();
      refreshCashList();
      renderSalesList();
      populateCustomerSelect();
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (id === 'dashboard') renderDashboard();
      if (id === 'reports') renderReports();
      if (id === 'salesList') renderSalesList();
      if (id === 'products') renderProducts();
      if (id === 'customers') renderCustomers();
      if (id === 'suppliers') renderSuppliers();
      if (id === 'cash') refreshCashList();
    }

    // ==================== DASHBOARD ====================
    function renderDashboard() {
      const today = new Date().toISOString().slice(0,10);
      let sales = 0, profit = 0;

      const stmt = db.prepare("SELECT SUM(total) as s, SUM(profit) as p FROM invoices WHERE date=?");
      stmt.bind([today]);
      if (stmt.step()) {
        const r = stmt.getAsObject();
        sales = r.s || 0;
        profit = r.p || 0;
      }
      stmt.free();

      document.getElementById('today-sales').textContent = sales.toFixed(0) + ' ريال';
      document.getElementById('today-profit').textContent = profit.toFixed(0) + ' ريال';

      const container = document.getElementById('low-stock-list');
      container.innerHTML = '';
      const low = db.prepare("SELECT * FROM products WHERE stock <= minStock ORDER BY stock LIMIT 6");
      let found = false;
      while (low.step()) {
        found = true;
        const p = low.getAsObject();
        const div = document.createElement('div');
        div.className = "flex justify-between bg-orange-50 p-4 rounded-2xl";
        div.innerHTML = `<span class="font-medium">\( {p.name}</span><span class="font-bold text-orange-600"> \){p.stock} ${p.unit}</span>`;
        container.appendChild(div);
      }
      low.free();
      if (!found) container.innerHTML = `<p class="text-center text-green-600 py-6">✅ جميع الأصناف آمنة</p>`;
    }

    // ==================== PRODUCTS ====================
    function renderProducts() {
      const container = document.getElementById('products-list');
      container.innerHTML = '';
      const stmt = db.prepare("SELECT * FROM products ORDER BY name");
      while (stmt.step()) {
        const p = stmt.getAsObject();
        const div = document.createElement('div');
        div.className = "bg-white p-5 rounded-3xl shadow flex justify-between items-center";
        div.innerHTML = `
          <div>
            <div class="font-bold">${p.name}</div>
            <div class="text-sm">تكلفة: ${p.cost} | بيع: ${p.price} | مخزون: ${p.stock} ${p.unit}</div>
          </div>
          <button onclick="editProduct(${p.id})" class="text-teal-600">تعديل</button>`;
        container.appendChild(div);
      }
      stmt.free();
    }

    function addNewProduct() {
      const name = prompt("اسم الصنف:");
      if (!name) return;
      const cost = parseFloat(prompt("سعر التكلفة:", "80"));
      const price = parseFloat(prompt("سعر البيع:", "120"));
      const stock = parseFloat(prompt("المخزون الأولي:", "50"));
      const minStock = parseFloat(prompt("حد التنبيه:", "10"));
      const unit = prompt("الوحدة:", "متر");

      db.run("INSERT INTO products (name, cost, price, stock, minStock, unit) VALUES (?,?,?,?,?,?)", [name, cost, price, stock, minStock, unit]);
      saveDB();
      renderProducts();
      renderDashboard();
    }

    function editProduct(id) {
      const stock = prompt("المخزون الجديد:");
      if (stock === null) return;
      db.run("UPDATE products SET stock = ? WHERE id = ?", [parseFloat(stock), id]);
      saveDB();
      renderProducts();
      renderDashboard();
    }

    // ==================== CUSTOMERS ====================
    function renderCustomers() {
      const container = document.getElementById('customers-list');
      container.innerHTML = '';
      const stmt = db.prepare("SELECT * FROM customers ORDER BY name");
      while (stmt.step()) {
        const c = stmt.getAsObject();
        const div = document.createElement('div');
        div.className = "bg-white p-5 rounded-3xl shadow flex justify-between items-center";
        div.innerHTML = `<div><div class="font-bold">\( {c.name}</div><div class="text-sm"> \){c.phone || ''}</div><div class="text-teal-600">رصيد: ${c.balance} ريال</div></div>
                         <button onclick="editCustomer(${c.id})" class="text-teal-600">تعديل</button>`;
        container.appendChild(div);
      }
      stmt.free();
    }

    function addCustomer() {
      const name = prompt("اسم العميل:");
      if (!name) return;
      const phone = prompt("رقم الجوال:", "");
      db.run("INSERT INTO customers (name, phone) VALUES (?, ?)", [name, phone]);
      saveDB();
      renderCustomers();
    }

    function editCustomer(id) {
      const balance = prompt("الرصيد الجديد:", "0");
      if (balance === null) return;
      db.run("UPDATE customers SET balance = ? WHERE id = ?", [parseFloat(balance), id]);
      saveDB();
      renderCustomers();
    }

    // ==================== SUPPLIERS ====================
    function renderSuppliers() {
      const container = document.getElementById('suppliers-list');
      container.innerHTML = '';
      const stmt = db.prepare("SELECT * FROM suppliers ORDER BY name");
      while (stmt.step()) {
        const s = stmt.getAsObject();
        const div = document.createElement('div');
        div.className = "bg-white p-5 rounded-3xl shadow flex justify-between items-center";
        div.innerHTML = `<div><div class="font-bold">\( {s.name}</div><div class="text-sm"> \){s.phone || ''}</div></div>
                         <button onclick="editSupplier(${s.id})" class="text-teal-600">تعديل</button>`;
        container.appendChild(div);
      }
      stmt.free();
    }

    function addSupplier() {
      const name = prompt("اسم المورد:");
      if (!name) return;
      const phone = prompt("رقم الجوال:", "");
      db.run("INSERT INTO suppliers (name, phone) VALUES (?, ?)", [name, phone]);
      saveDB();
      renderSuppliers();
    }

    function editSupplier(id) {
      const balance = prompt("الرصيد:", "0");
      if (balance === null) return;
      db.run("UPDATE suppliers SET balance = ? WHERE id = ?", [parseFloat(balance), id]);
      saveDB();
      renderSuppliers();
    }

    // ==================== CASH ====================
    function refreshCashList() {
      const tbody = document.getElementById('cash-table');
      tbody.innerHTML = '';
      const stmt = db.prepare("SELECT * FROM cash ORDER BY id DESC");
      while (stmt.step()) {
        const r = stmt.getAsObject();
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="p-3">\( {r.type}</td><td class="p-3"> \){r.description}</td><td class="p-3 font-bold">\( {r.amount}</td><td class="p-3"> \){r.date}</td><td class="p-3">${r.voucher}</td>`;
        tbody.appendChild(tr);
      }
      stmt.free();
    }

    function addCashTransaction() {
      const type = confirm("قبض أم صرف؟ (OK = قبض)") ? "قبض" : "صرف";
      const desc = prompt("البيان:", "");
      const amount = parseFloat(prompt("المبلغ:", "1000"));
      if (!amount) return;
      const date = new Date().toLocaleDateString('ar-SA');
      const voucher = Math.floor(1000 + Math.random() * 9000);
      db.run("INSERT INTO cash (type, description, amount, date, voucher) VALUES (?, ?, ?, ?, ?)", [type, desc, amount, date, voucher]);
      saveDB();
      refreshCashList();
    }

    // ==================== POS & CART ====================
    function populateCustomerSelect() {
      const select = document.getElementById('pos-customer');
      select.innerHTML = '<option value="عميل عام">عميل عام</option>';
      const stmt = db.prepare("SELECT name FROM customers ORDER BY name");
      while (stmt.step()) {
        const opt = document.createElement('option');
        opt.value = stmt.getAsObject().name;
        opt.textContent = stmt.getAsObject().name;
        select.appendChild(opt);
      }
      stmt.free();
    }

    function searchAndAddToCart() {
      const query = (document.getElementById('product-search-input').value || "").toLowerCase().trim();
      const stmt = db.prepare("SELECT * FROM products WHERE LOWER(name) LIKE ? AND stock > 0");
      stmt.bind(['%' + query + '%']);
      const products = [];
      while (stmt.step()) products.push(stmt.getAsObject());
      stmt.free();

      if (products.length === 0) return alert("❌ لا يوجد صنف بهذا الاسم");
      if (products.length === 1) {
        addToCart(products[0]);
      } else {
        let txt = products.map((p,i) => `${i+1}. \( {p.name} ( \){p.stock} ${p.unit})`).join('\n');
        const choice = prompt(`اختر رقم الصنف:\n${txt}`, "1");
        const idx = parseInt(choice) - 1;
        if (idx >= 0 && idx < products.length) addToCart(products[idx]);
      }
    }

    function addToCart(product) {
      const qty = parseFloat(prompt(`كمية ${product.name} (متوفر: ${product.stock})`, "1"));
      if (!qty || qty > product.stock) return alert("كمية غير متوفرة!");
      currentCart.push({
        id: product.id,
        name: product.name,
        qty: qty,
        price: product.price,
        cost: product.cost,
        subtotal: qty * product.price
      });
      renderCart();
      document.getElementById('product-search-input').value = '';
    }

    function renderCart() {
      const container = document.getElementById('cart-items');
      container.innerHTML = currentCart.map((item, i) => `
        <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl">
          <div>${item.name} × ${item.qty}</div>
          <div class="flex items-center gap-3">
            <span class="font-bold">${item.subtotal} ريال</span>
            <i onclick="removeFromCart(${i})" class="fas fa-trash text-red-500 cursor-pointer"></i>
          </div>
        </div>`).join('');
      const total = currentCart.reduce((a, b) => a + b.subtotal, 0);
      document.getElementById('cart-total').textContent = total + ' ريال';
    }

    function removeFromCart(i) {
      if (confirm('حذف هذا الصنف من السلة؟')) {
        currentCart.splice(i, 1);
        renderCart();
      }
    }

    function saveSale() {
      if (currentCart.length === 0) return alert("السلة فارغة");
      const customer = document.getElementById('pos-customer').value || "عميل عام";
      const date = document.getElementById('pos-date').value || new Date().toISOString().slice(0,10);
      const total = currentCart.reduce((a, b) => a + b.subtotal, 0);
      const profit = currentCart.reduce((a, b) => a + (b.qty * (b.price - b.cost)), 0);

      db.run("INSERT INTO invoices (date, customer, total, profit) VALUES (?,?,?,?)", [date, customer, total, profit]);
      const invoiceId = db.exec("SELECT last_insert_rowid()")[0].values[0][0];

      const stmt = db.prepare("INSERT INTO invoice_items (invoice_id, product_id, name, qty, price, cost) VALUES (?,?,?,?,?,?)");
      currentCart.forEach(item => {
        stmt.run([invoiceId, item.id, item.name, item.qty, item.price, item.cost]);
        db.run("UPDATE products SET stock = stock - ? WHERE id = ?", [item.qty, item.id]);
      });
      stmt.free();

      if (customer !== "عميل عام") {
        db.run("UPDATE customers SET balance = balance + ? WHERE name = ?", [total, customer]);
      }

      saveDB();
      alert(`✅ تم حفظ الفاتورة رقم #${invoiceId} بنجاح!`);
      currentCart = [];
      renderCart();
      showScreen('dashboard');
      renderDashboard();
      renderSalesList();
    }

    function printCurrentSale() {
      if (currentCart.length === 0) return alert("السلة فارغة");
      let html = currentCart.map(i => `<div style="display:flex;justify-content:space-between;margin:10px 0;"><span>${i.name} × \( {i.qty}</span><span> \){i.subtotal} ريال</span></div>`).join('');
      const total = currentCart.reduce((a,b)=>a+b.subtotal,0);
      const printContent = `
        <div style="padding:40px;font-family:Arial;direction:rtl;text-align:right;max-width:600px;margin:auto;border:3px solid #0f766e;border-radius:15px;">
          <h1 style="text-align:center;color:#0f766e;font-size:28px;">تكاليف سوفت - النسيج Pro v2</h1>
          <p><strong>العميل:</strong> ${document.getElementById('pos-customer').value || "عميل عام"}</p>
          <p><strong>التاريخ:</strong> ${document.getElementById('pos-date').value}</p>
          <hr style="margin:20px 0;">
          ${html}
          <hr style="margin:20px 0;">
          <div style="font-size:24px;font-weight:bold;text-align:right;">الإجمالي: ${total} ريال</div>
        </div>`;
      const area = document.getElementById('print-area');
      area.innerHTML = printContent;
      area.classList.remove('hidden');
      window.print();
      area.classList.add('hidden');
    }

    // ==================== SALES LIST ====================
    function renderSalesList() {
      const container = document.getElementById('sales-list-container');
      container.innerHTML = '';
      const stmt = db.prepare("SELECT * FROM invoices ORDER BY id DESC LIMIT 50");
      while (stmt.step()) {
        const inv = stmt.getAsObject();
        const div = document.createElement('div');
        div.className = "bg-white p-5 rounded-3xl shadow flex justify-between items-center cursor-pointer";
        div.innerHTML = `<div><div class="font-bold">#${inv.id} - \( {inv.customer}</div><div class="text-sm"> \){inv.date} • ${inv.total} ريال</div></div>`;
        div.onclick = () => viewInvoiceDetails(inv.id);
        container.appendChild(div);
      }
      stmt.free();
    }

    function viewInvoiceDetails(id) {
      alert(`تفاصيل الفاتورة رقم #${id}\n\n(يمكن توسيع هذه الميزة لعرض الأصناف في التحديث القادم إذا طلبت)`);
    }

    // ==================== REPORTS ====================
    function renderReports() {
