<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تكاليف سوفت - النسيج</title>
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.14.0/dist/sql-wasm.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .teal { background-color: #0f766e; }
    .screen { display: none; }
    .active { display: block; }
  </style>
</head>
<body class="bg-gray-100 rtl">

  <!-- Top Bar -->
  <div class="teal text-white p-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <i onclick="showScreen('dashboard')" class="fas fa-bars text-3xl cursor-pointer"></i>
      <h1 class="text-2xl font-bold">تكاليف سوفت</h1>
    </div>
    <div class="flex items-center gap-4">
      <i class="fas fa-bell text-2xl"></i>
      <i class="fas fa-share-alt text-2xl"></i>
    </div>
  </div>

  <!-- Quick Action Buttons (matches your screenshot) -->
  <div class="p-4 grid grid-cols-2 gap-3">
    <!-- Row 1 -->
    <button onclick="alert('قبض/صرف - قيد قيد التطوير')" class="bg-white rounded-2xl shadow p-4 flex items-center gap-3">
      <div class="w-12 h-12 bg-teal-600 text-white rounded-2xl flex items-center justify-center text-3xl">📄</div>
      <div class="text-right">
        <p class="font-bold">قبض/صرف</p>
      </div>
    </button>
    <button onclick="showScreen('sales')" class="bg-white rounded-2xl shadow p-4 flex items-center gap-3">
      <div class="w-12 h-12 bg-teal-600 text-white rounded-2xl flex items-center justify-center text-3xl">🛒</div>
      <div class="text-right">
        <p class="font-bold">المبيعات</p>
      </div>
    </button>

    <!-- Row 2 -->
    <button onclick="alert('الحسابات - قيد التطوير')" class="bg-white rounded-2xl shadow p-4 flex items-center gap-3">
      <div class="w-12 h-12 bg-teal-600 text-white rounded-2xl flex items-center justify-center text-3xl">💰</div>
      <div class="text-right">
        <p class="font-bold">الحسابات</p>
      </div>
    </button>
    <button onclick="alert('المشتريات - قيد التطوير')" class="bg-white rounded-2xl shadow p-4 flex items-center gap-3">
      <div class="w-12 h-12 bg-teal-600 text-white rounded-2xl flex items-center justify-center text-3xl">📦</div>
      <div class="text-right">
        <p class="font-bold">المشتريات</p>
      </div>
    </button>

    <!-- Row 3 -->
    <button onclick="alert('تصميم منتج - قيد التطوير')" class="bg-white rounded-2xl shadow p-4 flex items-center gap-3">
      <div class="w-12 h-12 bg-teal-600 text-white rounded-2xl flex items-center justify-center text-3xl">⚙️</div>
      <div class="text-right">
        <p class="font-bold">تصميم منتج</p>
      </div>
    </button>
    <button onclick="alert('أمر إنتاج - قيد التطوير')" class="bg-white rounded-2xl shadow p-4 flex items-center gap-3">
      <div class="w-12 h-12 bg-teal-600 text-white rounded-2xl flex items-center justify-center text-3xl">📦</div>
      <div class="text-right">
        <p class="font-bold">أمر إنتاج</p>
      </div>
    </button>
  </div>

  <!-- Expandable Sections (exactly like your screenshot) -->
  <div class="px-4 space-y-2">
    <div onclick="toggleSection(this)" class="teal text-white p-4 rounded-2xl flex justify-between items-center cursor-pointer">
      <span class="font-bold">عمليات مخزنية</span>
      <i class="fas fa-chevron-down"></i>
    </div>
    <div class="section-content hidden bg-white rounded-2xl shadow p-2">
      <div class="py-3 px-4 border-b">توريد مخزني</div>
      <div class="py-3 px-4 border-b">صرف مخزني</div>
      <div class="py-3 px-4 border-b">تحويل مخزني</div>
      <div class="py-3 px-4 border-b">تسوية مخزنية</div>
      <div class="py-3 px-4 border-b">إضافة مخزن</div>
      <div class="py-3 px-4">جرد مخزني</div>
    </div>

    <div onclick="toggleSection(this)" class="teal text-white p-4 rounded-2xl flex justify-between items-center cursor-pointer">
      <span class="font-bold">قيود وحسابات</span>
      <i class="fas fa-chevron-down"></i>
    </div>
    <div class="section-content hidden bg-white rounded-2xl shadow p-2 text-gray-500">
      <div class="py-3 px-4">قيد قيد التطوير...</div>
    </div>

    <div onclick="toggleSection(this)" class="teal text-white p-4 rounded-2xl flex justify-between items-center cursor-pointer">
      <span class="font-bold">أصناف</span>
      <i class="fas fa-chevron-down"></i>
    </div>
    <div onclick="showScreen('products')" class="section-content hidden bg-white rounded-2xl shadow p-2">
      <div class="py-3 px-4 text-teal-600 cursor-pointer">📋 الأصناف والمخزون (اضغط هنا)</div>
    </div>
  </div>

  <!-- Screens (Sales + Products + Data) -->
  <div id="sales" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">بيع آجل</h2>
    <!-- (Same sales screen as before) -->
    <div class="bg-white rounded-3xl p-6 shadow">... (الكود الكامل للمبيعات موجود في النسخة السابقة)</div>
  </div>

  <div id="products" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">الأصناف والمخزون</h2>
    <button onclick="addNewProduct()" class="w-full bg-teal-600 text-white py-4 rounded-3xl mb-6">+ إضافة صنف قماش جديد</button>
    <div id="products-list" class="space-y-4"></div>
  </div>

  <div id="dashboard" class="screen active p-4">
    <!-- Dashboard content already shown above -->
  </div>

  <script>
    // Toggle sections
    function toggleSection(el) {
      const content = el.nextElementSibling;
      content.classList.toggle('hidden');
      const icon = el.querySelector('i');
      icon.classList.toggle('fa-chevron-down');
      icon.classList.toggle('fa-chevron-up');
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      if (document.getElementById(id)) document.getElementById(id).classList.add('active');
    }

    // Placeholder for the rest of the functionality (SQLite, sales, etc.)
    // The full working code is already in your repo. This update is only for the visual dashboard.
    console.log('%c✅ Dashboard updated to match original تكاليف سوفت!', 'color:#0f766e; font-size:18px; font-weight:bold');
  </script>
</body>
</html>
